name: Deploy to GitHub Pages

on:
  push:
    branches: [main, claude/phaser-platformer-game-OE4UC]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout game branch
        uses: actions/checkout@v4
        with:
          ref: claude/phaser-platformer-game-OE4UC
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git subtree split --prefix dist -b _deploy_tmp
          git push --force origin _deploy_tmp:gh-pages
          git branch -D _deploy_tmp
